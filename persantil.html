<script>
// ============ LANGUAGE ============
let currentLang = 'tr';
function toggleLang() {
    currentLang = currentLang === 'tr' ? 'en' : 'tr';
    document.getElementById('langBtn').textContent = currentLang === 'tr' ? 'EN' : 'TR';
    document.getElementById('pageTitle').textContent = currentLang === 'tr' ? 'Persantil Hesaplama' : 'Percentile Calculator';
    document.querySelectorAll('[data-tr]').forEach(el => { el.textContent = el.getAttribute('data-' + currentLang); });
    document.querySelectorAll('select option[data-tr]').forEach(opt => { opt.textContent = opt.getAttribute('data-' + currentLang); });
    document.querySelectorAll('.nav-pill').forEach(pill => {
        const map = { boykilopct:{tr:'Boy/Kilo',en:'Height/Weight'}, bmipct:{tr:'VKI',en:'BMI'}, hcpct:{tr:'Bas Cevresi',en:'Head Circ.'} };
        if (map[pill.dataset.calc]) pill.textContent = map[pill.dataset.calc][currentLang];
    });
    updatePctLabel();
}

// ============ NAV ============
const navDefs = [
    { key:'boykilopct', tr:'Boy/Kilo', en:'Height/Weight' },
    { key:'bmipct',     tr:'VKI',      en:'BMI' },
    { key:'hcpct',      tr:'Bas Cevresi', en:'Head Circ.' }
];
function initNav() {
    const nav = document.getElementById('navPills');
    navDefs.forEach((d, i) => {
        const pill = document.createElement('span');
        pill.className = 'nav-pill' + (i === 0 ? ' active' : '');
        pill.textContent = d[currentLang];
        pill.dataset.calc = d.key;
        pill.onclick = () => {
            document.querySelectorAll('.calc-card').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.nav-pill').forEach(p => p.classList.remove('active'));
            document.getElementById('calc-' + d.key).classList.add('active');
            pill.classList.add('active');
        };
        nav.appendChild(pill);
    });
    document.getElementById('calc-boykilopct').classList.add('active');
}

function t(tr, en) { return currentLang === 'tr' ? tr : en; }

function showResult(id, title, value, details, cls) {
    const box = document.getElementById(id);
    box.innerHTML = `<div class="result-title">${title}</div><div class="result-value">${value}</div>` +
        (details ? `<div class="result-detail ${cls || ''}">${details}</div>` : '');
    box.classList.add('show');
}

function updatePctLabel() {
    const type = document.getElementById('pct-type').value;
    const lbl = document.getElementById('pct-val-label');
    lbl.textContent = type === 'weight'
        ? t('Kilo (kg)', 'Weight (kg)')
        : t('Boy (cm)', 'Height (cm)');
}

function syncAge() { /* age is read directly */ }

// ── Date of birth → age helpers ──────────────────────────────────
function _ageFromDob(dobVal) {
    const dob = new Date(dobVal);
    if (isNaN(dob)) return null;
    const now = new Date();
    let y = now.getFullYear() - dob.getFullYear();
    let m = now.getMonth() - dob.getMonth();
    if (now.getDate() < dob.getDate()) m--;
    if (m < 0) { y--; m += 12; }
    return { years: y, months: m, totalMonths: y * 12 + m };
}

function dobToPctAge() {
    const age = _ageFromDob(document.getElementById('pct-dob').value);
    if (!age) return;
    document.getElementById('pct-agey').value = Math.min(18, Math.max(0, age.years));
    document.getElementById('pct-agem').value = Math.min(11, Math.max(0, age.months));
}

function dobToBpctAge() {
    const age = _ageFromDob(document.getElementById('bpct-dob').value);
    if (!age) return;
    document.getElementById('bpct-age').value = Math.min(18, Math.max(2, age.years));
}

function dobToHcAge() {
    const age = _ageFromDob(document.getElementById('hc-dob').value);
    if (!age) return;
    document.getElementById('hc-age').value = Math.min(36, Math.max(0, age.totalMonths));
}

function interpolateLMS(lmsTable, ageMonths) {
    if (ageMonths <= lmsTable[0][0]) return lmsRefsAt(lmsTable[0]);
    if (ageMonths >= lmsTable[lmsTable.length-1][0]) return lmsRefsAt(lmsTable[lmsTable.length-1]);
    for (let i = 0; i < lmsTable.length - 1; i++) {
        const a0 = lmsTable[i][0], a1 = lmsTable[i+1][0];
        if (ageMonths >= a0 && ageMonths <= a1) {
            const f = (ageMonths - a0) / (a1 - a0);
            const L = lmsTable[i][1] + f * (lmsTable[i+1][1] - lmsTable[i][1]);
            const M = lmsTable[i][2] + f * (lmsTable[i+1][2] - lmsTable[i][2]);
            const S = lmsTable[i][3] + f * (lmsTable[i+1][3] - lmsTable[i][3]);
            return lmsRefsAt([null, L, M, S]);
        }
    }
    return lmsRefsAt(lmsTable[lmsTable.length-1]);
}

function lmsRefsAt(row) {
    const L = row[1], M = row[2], S = row[3];
    return PCT_Z.map(z => {
        if (Math.abs(L) < 1e-6) return M * Math.exp(S * z);
        return M * Math.pow(1 + L * S * z, 1 / L);
    });
}

// ============ INTERPOLATION ============
function interpolateTable(table, ageMonths) {
    if (ageMonths <= table[0][0]) return table[0].slice(1);
    if (ageMonths >= table[table.length-1][0]) return table[table.length-1].slice(1);
    for (let i = 0; i < table.length - 1; i++) {
        const a0 = table[i][0], a1 = table[i+1][0];
        if (ageMonths >= a0 && ageMonths <= a1) {
            const f = (ageMonths - a0) / (a1 - a0);
            return table[i].slice(1).map((v, j) => v + f * (table[i+1][j+1] - v));
        }
    }
    return table[table.length-1].slice(1);
}

const PCT_LABELS  = [3, 10, 25, 50, 75, 90, 97];
const PCT_NAMES   = ['P3','P10','P25','P50','P75','P90','P97'];
// Approximate z-scores: P3≈-1.88, P10≈-1.28, P25≈-0.67, P50=0, P75=0.67, P90=1.28, P97=1.88
const PCT_Z       = [-1.88, -1.28, -0.67, 0, 0.67, 1.28, 1.88];

function valueToPercentile(val, refs) {
    // refs = [P3, P10, P25, P50, P75, P90, P97]
    if (val <= refs[0]) return { pct: '< 3', z: (PCT_Z[0]).toFixed(1), band: 0 };
    if (val >= refs[6]) return { pct: '> 97', z: '>' + PCT_Z[6].toFixed(1), band: 8 };
    for (let i = 0; i < 6; i++) {
        if (val >= refs[i] && val <= refs[i+1]) {
            const f = (val - refs[i]) / (refs[i+1] - refs[i]);
            const pct = PCT_LABELS[i] + f * (PCT_LABELS[i+1] - PCT_LABELS[i]);
            const z   = PCT_Z[i]     + f * (PCT_Z[i+1]      - PCT_Z[i]);
            return { pct: pct.toFixed(0), z: z.toFixed(2), band: i + 1 };
        }
    }
    return { pct: '?', z: '?', band: 0 };
}

function interpretBand(band) {
    if (band === 0) return { tr: 'P3 alti - Olasi malnütrisyon / boy kisaligi', en: 'Below P3 - Possible malnutrition / stunting', cls: 'danger' };
    if (band === 1) return { tr: 'P3-P10 - Dusuk normal sinir', en: 'P3-P10 - Low-normal range', cls: 'warning' };
    if (band <= 5)  return { tr: 'P10-P90 - Normal', en: 'P10-P90 - Normal range', cls: 'success' };
    if (band === 6) return { tr: 'P90-P97 - Yuksek normal sinir', en: 'P90-P97 - High-normal range', cls: 'warning' };
    return { tr: 'P97 ustu - Fazla kilolu / uzun', en: 'Above P97 - Overweight / tall', cls: 'danger' };
}

function buildPctBar(pctNum) {
    // pctNum is 0-100
    const pos = Math.min(Math.max(pctNum, 0), 100);
    return `<div class="pct-bar-wrap">
      <div class="pct-bar-labels"><span>P3</span><span>P10</span><span>P25</span><span>P50</span><span>P75</span><span>P90</span><span>P97</span></div>
      <div class="pct-bar-track">
        <div class="pct-bar-marker" style="left:${pos}%"></div>
      </div>
    </div>`;
}

function buildRefTable(refs, val, labels) {
    const names = labels || PCT_NAMES;
    let html = '<table class="pct-table"><tr><th>' + names.join('</th><th>') + '</th></tr><tr>';
    refs.forEach((r, i) => {
        const hi = val >= (refs[i-1]||0) && val <= r ? 'class="highlight"' : '';
        html += `<td ${hi}>${r.toFixed(1)}</td>`;
    });
    html += '</tr></table>';
    return html;
}

    if (isNaN(val)) return;
    const totalMonths = agey * 12 + agem;
    if (totalMonths < 0 || totalMonths > 216) {
        showResult('pct-result', t('Hata','Error'), '-', t('Yas 0-18 yil araliginda olmali.','Age must be 0-18 years.'), 'danger'); return;

        ? (sex === 'male' ? WEIGHT_BOYS : WEIGHT_GIRLS)
        : (sex === 'male' ? HEIGHT_BOYS : HEIGHT_GIRLS);

            `<div style="background:#F0FDF4;border:1px solid #BBF7D0;border-radius:10px;padding:14px">` +
            `<div style="font-size:0.72rem;font-weight:700;color:#15803D;text-transform:uppercase;letter-spacing:0.05em;margin-bottom:6px">WHO Referansı</div>` +
            `<div style="font-size:1.25rem;font-weight:700;color:#0F172A;margin-bottom:2px">${whoPctDisplay} (${val} cm)</div>` +
            `<div style="font-size:0.88rem;font-weight:600;margin-bottom:2px" class="${whoInterp.cls}">${whoInterp[currentLang]}</div>` +
            `<div style="font-size:0.82rem;color:#475569;margin-bottom:8px">Z-skor: ${whoResult.z} · ${t('Yaş','Age')}: ${ageLabel}</div>` +
            buildPctBar(whoPctNum, '#15803D') +
            buildRefTable(whoRefs, val) + `</div>`;

        const box = document.getElementById('pct-result');
        box.innerHTML =
            `<div class="result-title">${t('Boy Persantili','Height Percentile')}</div>` +
            `<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:6px">${neyziCard}${whoCard}</div>`;
        box.classList.add('show');
        return;
    }

    const details =
        `<strong>${interp[currentLang]}</strong><br>` +
        `Z-skor: ${result.z}<br>${t('Yaş','Age')}: ${ageLabel}<br>` +
        buildPctBar(parseFloat(result.pct) || (result.pct.startsWith('<') ? 1 : 99)) +
        buildRefTable(refs, val);

    showResult('pct-result', typeLbl + ' ' + t('Persantili','Percentile'),
        pctDisplay + ' (' + val + ' ' + unit + ')',
        details, interp.cls);
}

function calcBMIauto() {
    const h = parseFloat(document.getElementById('bpct-h').value);
    const w = parseFloat(document.getElementById('bpct-w').value);
    if (h > 0 && w > 0) {
        document.getElementById('bpct-bmi').value = (w / ((h/100)**2)).toFixed(1);
    }
}

function calcBMIPercentile() {
    const sex = document.getElementById('bpct-sex').value;
    const age = parseFloat(document.getElementById('bpct-age').value);
    const bmi = parseFloat(document.getElementById('bpct-bmi').value);

    if (!age || !bmi) return;
    if (age < 2 || age > 18) {
        showResult('bpct-result','VKI Persantili','-',t('Yas 2-18 araliginda olmali.','Age must be 2-18 years.'),'danger'); return;
    }

    const ageMonths = age * 12;
    const table = sex === 'male' ? BMI_BOYS : BMI_GIRLS;
    const refs = interpolateTable(table, ageMonths);
    // BMI table uses P5,P15,P25,P50,P75,P85,P95 labels
    const bmiLabels = ['P5','P15','P25','P50','P75','P85','P95'];
    const bmiPcts   = [5, 15, 25, 50, 75, 85, 95];
    const bmiZ      = [-1.65, -1.04, -0.67, 0, 0.67, 1.04, 1.65];

    let pctEst = '?', zEst = '?', band = 4;
    if (bmi <= refs[0]) { pctEst = '< 5'; zEst = '< -1.65'; band = 0; }
    else if (bmi >= refs[6]) { pctEst = '> 95'; zEst = '> 1.65'; band = 7; }
    else {
        for (let i = 0; i < 6; i++) {
            if (bmi >= refs[i] && bmi <= refs[i+1]) {
                const f = (bmi - refs[i]) / (refs[i+1] - refs[i]);
                pctEst = (bmiPcts[i] + f * (bmiPcts[i+1] - bmiPcts[i])).toFixed(0);
                zEst   = (bmiZ[i]    + f * (bmiZ[i+1]    - bmiZ[i])).toFixed(2);
                band = i + 1;
            }
        }
    }

    let cat, cls;
    if (band === 0) { cat = t('Zayif (P5 alti)', 'Underweight (<P5)'); cls = 'warning'; }
    else if (band <= 2) { cat = t('Normal alt sinir (P5-P15)', 'Low normal (P5-P15)'); cls = 'success'; }
    else if (band <= 4) { cat = t('Normal (P15-P75)', 'Normal (P15-P75)'); cls = 'success'; }
    else if (band === 5) { cat = t('Kilolu riski (P75-P85)', 'Overweight risk (P75-P85)'); cls = 'warning'; }
    else if (band === 6) { cat = t('Kilolu (P85-P95)', 'Overweight (P85-P95)'); cls = 'warning'; }
    else { cat = t('Obez (P95 ustu)', 'Obese (>P95)'); cls = 'danger'; }

    const pctDisplay = pctEst.startsWith('<') || pctEst.startsWith('>') ? pctEst : 'P' + pctEst;
    const details =
        `<strong>${cat}</strong><br>Z-skor: ${zEst}<br>` +
        buildRefTable(refs, bmi, bmiLabels);

    showResult('bpct-result', 'VKI ' + t('Persantili','Percentile'),
        pctDisplay + ' (VKI ' + bmi + ' kg/m²)', details, cls);
}

function calcHCPercentile() {
    const sex = document.getElementById('hc-sex').value;
    const age = parseFloat(document.getElementById('hc-age').value);
    const val = parseFloat(document.getElementById('hc-val').value);

    if (isNaN(age) || isNaN(val)) return;
    if (age < 0 || age > 36) {
        showResult('hc-result','Bas Cevresi','-',t('Yas 0-36 ay araliginda olmali.','Age must be 0-36 months.'),'danger'); return;
    }

    const table = sex === 'male' ? HC_BOYS : HC_GIRLS;
    const refs = interpolateTable(table, age);
    const result = valueToPercentile(val, refs);
    const interp = interpretBand(result.band);
    const pctDisplay = result.pct.startsWith('<') || result.pct.startsWith('>') ? result.pct : 'P' + result.pct;

    const details =
        `<strong>${interp[currentLang]}</strong><br>Z-skor: ${result.z}<br>` +
        buildPctBar(parseFloat(result.pct) || (result.pct.startsWith('<') ? 1 : 99)) +
        buildRefTable(refs, val);

    showResult('hc-result', t('Bas Cevresi Persantili','Head Circumference Percentile'),
        pctDisplay + ' (' + val + ' cm)', details, interp.cls);
}
