<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Online Not Defteri — Ücretsiz, Tarayıcı Tabanlı | DrTR Tools</title>
  <meta name="description" content="Ücretsiz online not defteri. Zengin metin düzenleme, çoklu not, arama. Tüm notlar yalnızca tarayıcınızda saklanır — sunucuya hiçbir veri gönderilmez.">
  <meta name="robots" content="index, follow">
  <link rel="canonical" href="https://drtr.uk/notepad/">
  <link rel="icon" type="image/svg+xml" href="../favicon.svg">
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-5561716689369449" crossorigin="anonymous"></script>
  <link rel="stylesheet" href="style.css">
  <style>
    /* DrTR topnav overlay */
    body {
      flex-direction: column;
    }
    .drtr-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 44px;
      padding: 0 16px;
      background: #1a1a2e;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      flex-shrink: 0;
      z-index: 200;
    }
    .drtr-nav-brand {
      display: flex;
      align-items: center;
      gap: 8px;
      text-decoration: none;
    }
    .drtr-nav-logo {
      width: 26px;
      height: 26px;
      background: linear-gradient(135deg, #0F766E, #3B82F6);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.7rem;
      font-weight: 800;
      color: #fff;
      letter-spacing: -0.5px;
    }
    .drtr-nav-name {
      font-size: 0.88rem;
      font-weight: 700;
      color: #e2e8f0;
    }
    .drtr-nav-name span {
      color: #5eead4;
    }
    .drtr-nav-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .drtr-nav-back {
      font-size: 0.8rem;
      color: rgba(255,255,255,0.5);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 4px;
      transition: color 0.15s;
    }
    .drtr-nav-back:hover { color: #5eead4; }
    .drtr-privacy-badge {
      font-size: 0.68rem;
      color: #4ade80;
      background: rgba(74,222,128,0.1);
      border: 1px solid rgba(74,222,128,0.2);
      border-radius: 4px;
      padding: 2px 8px;
      white-space: nowrap;
    }
    .app-shell {
      display: flex;
      flex: 1;
      overflow: hidden;
    }
    .app-shell > .sidebar { flex-shrink: 0; }
    .app-shell > .editor-area { flex: 1; min-width: 0; }
    @media print {
      .drtr-nav { display: none !important; }
    }
  </style>
</head>
<body>

  <!-- DrTR Navigation -->
  <nav class="drtr-nav">
    <a href="https://drtr.uk" class="drtr-nav-brand">
      <div class="drtr-nav-logo">DT</div>
      <span class="drtr-nav-name">DrTR <span>Tools</span></span>
    </a>
    <div class="drtr-nav-right">
      <span class="drtr-privacy-badge">🔒 Sunucuya veri gönderilmez</span>
      <a href="https://drtr.uk" class="drtr-nav-back">← Ana Sayfa</a>
    </div>
  </nav>

  <!-- App Shell -->
  <div class="app-shell">

    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <h2>Notlar</h2>
      </div>
      <button class="btn-create" id="btnCreate">+ Yeni Not</button>
      <div class="search-box">
        <input type="text" id="searchInput" placeholder="Notlarda ara...">
      </div>
      <div class="note-list" id="noteList"></div>
    </aside>

    <!-- Main Editor -->
    <main class="editor-area" id="editorArea">
      <!-- Toolbar -->
      <div class="toolbar" id="toolbar">
        <div class="toolbar-group">
          <button title="Yeni (Ctrl+Alt+N)" data-action="new">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="12" y1="18" x2="12" y2="12"/><line x1="9" y1="15" x2="15" y2="15"/></svg>
          </button>
          <button title="Aç (Ctrl+O)" data-action="open">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
          </button>
          <div class="save-dropdown-wrap">
            <button title="Kaydet (Ctrl+S)" data-action="toggleSaveMenu">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
              <svg width="10" height="10" viewBox="0 0 24 24" fill="currentColor" style="margin-left:2px"><path d="M7 10l5 5 5-5z"/></svg>
            </button>
            <div class="save-dropdown" id="saveDropdown">
              <button data-action="saveTxt">.txt olarak kaydet</button>
              <button data-action="savePdf">PDF olarak kaydet</button>
              <button data-action="saveWord">Word (.docx) olarak kaydet</button>
            </div>
          </div>
          <button title="Yazdır (Ctrl+P)" data-action="print">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
          </button>
        </div>
        <div class="toolbar-divider"></div>
        <div class="toolbar-group">
          <button title="Geri Al (Ctrl+Z)" data-action="undo">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg>
          </button>
          <button title="Yenile (Ctrl+Y)" data-action="redo">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.13-9.36L23 10"/></svg>
          </button>
        </div>
        <div class="toolbar-divider"></div>
        <div class="toolbar-group">
          <button title="Kalın (Ctrl+B)" data-action="bold"><b>B</b></button>
          <button title="İtalik (Ctrl+I)" data-action="italic"><i>I</i></button>
          <button title="Altı Çizili (Ctrl+U)" data-action="underline"><u>U</u></button>
          <button title="Üstü Çizili" data-action="strikeThrough"><s>S</s></button>
        </div>
        <div class="toolbar-divider"></div>
        <div class="toolbar-group">
          <select id="fontFamily" title="Yazı Tipi">
            <option value="sans-serif">Sans Serif</option>
            <option value="serif">Serif</option>
            <option value="monospace">Monospace</option>
            <option value="Arial">Arial</option>
            <option value="Georgia">Georgia</option>
            <option value="Times New Roman">Times New Roman</option>
            <option value="Courier New">Courier New</option>
            <option value="Verdana">Verdana</option>
          </select>
          <select id="fontSize" title="Yazı Boyutu">
            <option value="1">8</option>
            <option value="2">10</option>
            <option value="3" selected>12</option>
            <option value="4">14</option>
            <option value="5">18</option>
            <option value="6">24</option>
            <option value="7">36</option>
          </select>
        </div>
        <div class="toolbar-divider"></div>
        <div class="toolbar-group">
          <button title="Sola Hizala" data-action="justifyLeft">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="17" y1="10" x2="3" y2="10"/><line x1="21" y1="6" x2="3" y2="6"/><line x1="21" y1="14" x2="3" y2="14"/><line x1="17" y1="18" x2="3" y2="18"/></svg>
          </button>
          <button title="Ortaya Hizala" data-action="justifyCenter">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="10" x2="6" y2="10"/><line x1="21" y1="6" x2="3" y2="6"/><line x1="21" y1="14" x2="3" y2="14"/><line x1="18" y1="18" x2="6" y2="18"/></svg>
          </button>
          <button title="Sağa Hizala" data-action="justifyRight">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="21" y1="10" x2="7" y2="10"/><line x1="21" y1="6" x2="3" y2="6"/><line x1="21" y1="14" x2="3" y2="14"/><line x1="21" y1="18" x2="7" y2="18"/></svg>
          </button>
        </div>
        <div class="toolbar-divider"></div>
        <div class="toolbar-group">
          <button title="Numaralı Liste" data-action="insertOrderedList">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="10" y1="6" x2="21" y2="6"/><line x1="10" y1="12" x2="21" y2="12"/><line x1="10" y1="18" x2="21" y2="18"/><text x="3" y="7" font-size="6" fill="currentColor" stroke="none">1</text><text x="3" y="13" font-size="6" fill="currentColor" stroke="none">2</text><text x="3" y="19" font-size="6" fill="currentColor" stroke="none">3</text></svg>
          </button>
          <button title="Madde İşaretli Liste" data-action="insertUnorderedList">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><circle cx="4" cy="6" r="1.5" fill="currentColor"/><circle cx="4" cy="12" r="1.5" fill="currentColor"/><circle cx="4" cy="18" r="1.5" fill="currentColor"/></svg>
          </button>
        </div>
        <div class="toolbar-divider"></div>
        <div class="toolbar-group">
          <button title="Bul & Değiştir (Ctrl+H)" data-action="findReplace">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          </button>
          <button title="Tarih/Saat Ekle" data-action="insertDateTime">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
          </button>
          <button title="Tam Ekran" data-action="fullscreen">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/><line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/></svg>
          </button>
        </div>
      </div>

      <!-- Note Title -->
      <div class="note-title-bar">
        <input type="text" id="noteTitle" placeholder="Başlıksız Not" spellcheck="true">
        <button class="btn-delete" id="btnDelete" title="Notu Sil">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
        </button>
      </div>

      <!-- Editor -->
      <div class="editor-wrapper">
        <div id="editor" contenteditable="true" spellcheck="true"></div>
      </div>

      <!-- Status Bar -->
      <div class="status-bar">
        <span id="wordCount">Kelime: 0</span>
        <span id="charCount">Karakter: 0</span>
        <span id="saveStatus">Kaydedildi</span>
      </div>
    </main>

  </div><!-- /.app-shell -->

  <!-- Find & Replace Dialog -->
  <div class="dialog-overlay" id="findReplaceDialog" style="display:none">
    <div class="dialog">
      <div class="dialog-header">
        <h3>Bul &amp; Değiştir</h3>
        <button class="dialog-close" id="closeFindReplace">&times;</button>
      </div>
      <div class="dialog-body">
        <label>Bul:</label>
        <input type="text" id="findInput">
        <label>Değiştir:</label>
        <input type="text" id="replaceInput">
      </div>
      <div class="dialog-footer">
        <button id="btnFindNext">Sonrakini Bul</button>
        <button id="btnReplace">Değiştir</button>
        <button id="btnReplaceAll">Tümünü Değiştir</button>
      </div>
    </div>
  </div>

  <!-- Hidden file input -->
  <input type="file" id="fileInput" accept=".txt,.html,.md" style="display:none">

  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.2/html2pdf.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/html-docx-js@0.3.1/dist/html-docx.js"></script>
  <script src="app.js"></script>
</body>
</html>
